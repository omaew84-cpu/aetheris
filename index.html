<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AETHERIS — Login</title>
<script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_YOUR_KEY_HERE" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>body{margin:0;background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}button{background:#7c3aed;border:0;color:#fff;padding:14px 28px;border-radius:12px;font-size:16px;cursor:pointer}</style>
</head>
<body>
<h1>AETHERIS</h1>
<p>The AI OS that builds itself</p>
<div id="app">
  <button onclick="signIn()">Login with Google</button>
</div>
<script>
window.addEventListener('load', async () => {
  await Clerk.load()
  if (Clerk.user) location.href = '/app.html'
})
async function signIn(){
  await Clerk.load()
  Clerk.openSignIn({afterSignInUrl:'/app.html'})
}
</script>
</body>
</html>
