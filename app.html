<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AETHERIS App</title>
<script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_YOUR_KEY_HERE" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
body{margin:0;background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;text-align:center}
h1{font-size:32px;margin:0}
p{opacity:.7}
button{background:#7c3aed;border:0;color:#fff;padding:12px 24px;border-radius:10px;margin-top:20px;cursor:pointer}
img{width:80px;height:80px;border-radius:50%;margin-bottom:16px}
</style>
</head>
<body>
<img id="avatar" src="">
<h1 id="welcome">Loading...</h1>
<p id="email"></p>
<button onclick="logout()">Logout</button>

<script>
window.addEventListener('load', async () => {
  await Clerk.load()
  if (!Clerk.user) { location.href = '/' ; return }
  document.getElementById('welcome').textContent = `Welcome, ${Clerk.user.firstName || 'Founder'}`
  document.getElementById('email').textContent = Clerk.user.primaryEmailAddress.emailAddress
  document.getElementById('avatar').src = Clerk.user.imageUrl
})
function logout(){ Clerk.signOut().then(()=>location.href='/') }
</script>
</body>
</html>
